# Netlify + @netlify/angular-runtime: base must be the Angular app root so
# publish is "dist/frontend/browser" (matches angular.json output + plugin check).
# Install still runs from repo root (parent of base) for workspace lockfile.

[build]
  base = "frontend"
  command = "cd .. && npm ci && npm run build --workspace=frontend"
  publish = "dist/frontend/browser"

[build.environment]
  NODE_VERSION = "20"

# SPA: client routes must serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
