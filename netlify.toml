# Netlify + @netlify/angular-runtime: base must be the Angular app root so
# publish is "dist/frontend/browser" (matches angular.json output + plugin check).
# Install still runs from repo root (parent of base) for workspace lockfile.

[build]
  base = "frontend"
  # Writes environment.prod.secrets.ts from env (SUPABASE_URL, SUPABASE_ANON_KEY, optional API_BASE_URL).
  # In Netlify, set those vars with scope "Builds" or "All" so they exist at build time.
  command = "cd .. && node frontend/scripts/write-prod-secrets.mjs && npm ci && npm run build --workspace=frontend"
  publish = "dist/frontend/browser"

[build.environment]
  NODE_VERSION = "20"

# SPA: client routes must serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
