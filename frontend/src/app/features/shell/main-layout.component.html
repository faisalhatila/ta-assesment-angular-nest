<mat-sidenav-container class="shell">
  <mat-sidenav
    #drawer
    class="drawer"
    [mode]="sidenavMode()"
    [opened]="drawerOpened()"
    (openedChange)="drawerOpened.set($event)"
  >
    <div class="drawer-brand">Currency</div>
    <mat-nav-list>
      <a
        mat-list-item
        routerLink="/converter"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <mat-icon matListItemIcon>currency_exchange</mat-icon>
        <span matListItemTitle>Convert</span>
      </a>
      <a
        mat-list-item
        routerLink="/history"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <mat-icon matListItemIcon>history</mat-icon>
        <span matListItemTitle>History</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="content">
    <mat-toolbar color="primary" class="topbar">
      <button
        mat-icon-button
        type="button"
        (click)="toggleDrawer()"
        aria-label="Toggle navigation menu"
      >
        <mat-icon>menu</mat-icon>
      </button>
      <span class="topbar-title">Currency converter</span>
      <span class="spacer"></span>
      <span class="email">{{ auth.user()?.email }}</span>
      <button
        mat-icon-button
        type="button"
        (click)="logout()"
        aria-label="Log out"
      >
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>
    <div class="outlet">
      <router-outlet />
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
